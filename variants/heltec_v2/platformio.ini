  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/simple_repeater>
lib_deps =
  ${Heltec_lora32_v2.lib_deps}
  ${esp32_ota.lib_deps}

[env:Heltec_v2_repeater_bridge_udp_fragua]
extends = Heltec_lora32_v2
build_flags =
  ${Heltec_lora32_v2.build_flags}
  -D ADVERT_NAME='"Fragua Bridge"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D WITH_UDP_BRIDGE=1
  -D UDP_REMOTE_IP='"10.0.0.3"'
  -D UDP_REMOTE_PORT=5001
  -D UDP_LOCAL_PORT=5001
  -D WIFI_SSID='"${secrets.fragua_wifi_ssid}"'
  -D WIFI_PWD='"${secrets.fragua_wifi_pwd}"'
  -D ESP32_CPU_FREQ=240
  -D WIFI_DEBUG_LOGGING=1
  -D BRIDGE_DEBUG=1
  -D WG_ADDRESS='"10.0.0.4"'
  -D WG_PRIVATE_KEY='"${secrets.fragua_wg_priv}"'
  -D WG_PEER_PUBLIC_KEY='"${secrets.wg_peer_public_key}"'
  -D WG_PEER_ENDPOINT='"${secrets.wg_peer_endpoint}"'
  -D WG_PEER_PORT='"${secrets.wg_peer_port}"'
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${Heltec_lora32_v2.build_src_filter}
  +<helpers/bridges/UdpBridge.cpp>
  +<../examples/simple_repeater>
lib_deps =
  ${Heltec_lora32_v2.lib_deps}
  ${esp32_ota.lib_deps}
  https://github.com/ciniml/WireGuard-ESP32-Arduino.git

[env:Heltec_v2_repeater_bridge_udp_nodoisla]
extends = Heltec_lora32_v2
build_flags =
