  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"${secrets.remote_admin_pwd}"'
  -D MAX_NEIGHBOURS=50
  -D WITH_UDP_BRIDGE=1
  -D UDP_REMOTE_IP='"10.0.0.4"'
  -D UDP_REMOTE_PORT=5001
  -D UDP_LOCAL_PORT=5001
  -D WIFI_SSID='"${secrets.remote_wifi_ssid}"'
  -D WIFI_PWD='"${secrets.remote_wifi_pwd}"'
  -D ESP32_CPU_FREQ=240
  -D WIFI_DEBUG_LOGGING=1
  -D BRIDGE_DEBUG=1
  -D WG_ADDRESS='"10.0.0.3"'
  -D WG_PRIVATE_KEY='"${secrets.remote_wg_priv}"'
  -D WG_PEER_PUBLIC_KEY='"${secrets.wg_peer_public_key}"'
  -D WG_PEER_ENDPOINT='"${secrets.wg_peer_endpoint}"'
  -D WG_PEER_PORT='"${secrets.wg_peer_port}"'
